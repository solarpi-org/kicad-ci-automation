name: CI

# Self-test: verify the flake evaluates and scripts are well-formed.
# Never builds kicad or any heavy derivation - kicad-small hits
# cache.nixos.org during real project runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  lint:
    name: Flake eval & lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Evaluate flake (no build)
        # Checks all derivations evaluate to .drv without building anything
        run: nix flake check --no-build

      - name: shellcheck
        # ubuntu-latest ships shellcheck - no nix needed
        run: shellcheck -S warning src/kicad-ci.sh

      - name: Python syntax check
        # ubuntu-latest ships python3 - no nix needed
        run: python3 -m py_compile src/kicad-template.py src/kicad_ci/color.py src/kicad_ci/triptych.py src/kicad_ci/pdf.py src/kicad_ci/cli.py && echo "OK"

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Restore SBOM cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            sbom.cdx.json
            sbom.spdx.json
            sbom.csv
            .sbom-hash
          key: sbom-${{ hashFiles('flake.lock', 'flake.nix') }}

      - name: Generate SBOM
        if: steps.cache.outputs.cache-hit != 'true'
        run: nix run .#generate-sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.cdx.json
            sbom.spdx.json
            sbom.csv
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.cdx.json sbom.spdx.json

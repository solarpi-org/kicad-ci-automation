name: CI

# Self-test: verify the flake evaluates and scripts are well-formed.
# Never builds kicad or any heavy derivation - kicad-small hits
# cache.nixos.org during real project runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Flake eval & lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Evaluate flake (no build)
        # Checks all derivations evaluate to .drv without building anything
        run: nix flake check --no-build

      - name: shellcheck
        # ubuntu-latest ships shellcheck - no nix needed
        run: shellcheck -S warning src/kicad-ci.sh

      - name: Python syntax check
        # ubuntu-latest ships python3 - no nix needed
        run: python3 -m py_compile src/kicad-template.py src/kicad_ci/color.py src/kicad_ci/triptych.py src/kicad_ci/pdf.py src/kicad_ci/cli.py && echo "OK"

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable FlakeHub cache
        uses: DeterminateSystems/flakehub-cache-action@v2

      - name: Restore SBOM cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            sbom.cdx.json
            sbom.spdx.json
            sbom.csv
            .sbom-hash
          key: sbom-${{ hashFiles('flake.lock', 'flake.nix') }}

      - name: Generate SBOM
        if: steps.cache.outputs.cache-hit != 'true'
        run: nix run .#generate-sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.cdx.json
            sbom.spdx.json
            sbom.csv
          retention-days: 90

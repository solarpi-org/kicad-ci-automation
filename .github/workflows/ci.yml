name: CI

# Self-test: verify the flake evaluates cleanly and the shell script passes
# shellcheck. Does NOT build the kicad-ci package (that would pull the full
# kicad-small closure - let magic-nix-cache warm up from real project runs).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flake-check:
    name: Flake eval & shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Check flake evaluates
        run: nix flake check --no-build

      - name: shellcheck kicad-ci.sh
        run: |
          nix shell nixpkgs#shellcheck --command \
            shellcheck -S warning kicad-ci.sh

      - name: shellcheck kicad-template.py (syntax only)
        run: |
          nix shell nixpkgs#python3 --command \
            python3 -m py_compile kicad-template.py generate-diff-artifacts.py
          echo "Python syntax OK"

name: KiCAD CI

# Reusable workflow - called by KiCAD project repos.
#
# Usage in a calling workflow:
#
#   jobs:
#     kicad-ci:
#       uses: solarpi-org/kicad-ci-automation/.github/workflows/kicad-ci.yml@main
#       with:
#         project-path: .          # path to KiCAD project within the repo
#         enable-diff: true        # run visual diff on PRs (default: true)
#         defines-file: ''         # path to defines.json, relative to project-path
#       secrets: inherit

on:
  workflow_call:
    inputs:
      project-path:
        description: "Path to KiCAD project directory within the repo"
        type: string
        default: "."
      enable-diff:
        description: "Run visual diff on pull requests"
        type: boolean
        default: true
      defines-file:
        description: "Path to template defines file (JSON/YAML/KEY=VALUE), relative to project-path. Auto-detected if empty."
        type: string
        default: ""
      kicad-ci-ref:
        description: "Git ref of kicad-ci-automation to use (default: same ref as caller)"
        type: string
        default: "main"

jobs:
  # ── ERC + DRC ──────────────────────────────────────────────────────────────
  checks:
    name: ERC & DRC
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write

    outputs:
      erc-violations: ${{ steps.erc.outputs.violations }}
      drc-violations: ${{ steps.drc.outputs.violations }}
      has-schematic:  ${{ steps.find.outputs.has-schematic }}
      has-pcb:        ${{ steps.find.outputs.has-pcb }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Find KiCAD files
        id: find
        working-directory: ${{ inputs.project-path }}
        run: |
          SCHS=$(find . -maxdepth 2 -name "*.kicad_sch" | sort)
          PCBS=$(find . -maxdepth 2 -name "*.kicad_pcb" | sort)
          echo "has-schematic=$([ -n "$SCHS" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has-pcb=$([ -n "$PCBS" ] && echo true || echo false)"       >> "$GITHUB_OUTPUT"

      - name: Detect defines file
        id: defines
        shell: bash
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -n "${{ inputs.defines-file }}" ] && [ -f "${{ inputs.defines-file }}" ]; then
            echo "path=${{ inputs.defines-file }}" >> "$GITHUB_OUTPUT"
            echo "Found defines file (explicit): ${{ inputs.defines-file }}"
            exit 0
          fi
          for candidate in defines.json defines.yaml defines.yml defines.txt; do
            if [ -f "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              echo "Auto-detected defines file: $candidate"
              exit 0
            fi
          done
          echo "path=" >> "$GITHUB_OUTPUT"
          echo "No defines file found, using built-in placeholders only"

      - name: Build output prefix
        id: prefix
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PREFIX="pr-${{ github.event.number }}-${SHA}"
          else
            BRANCH="${GITHUB_REF_NAME//\//-}"
            PREFIX="${BRANCH}-${SHA}"
          fi
          echo "value=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "Output prefix: $PREFIX"

      - name: Run kicad-ci (ERC + DRC + ODB++)
        id: kicad-ci
        env:
          DEFINES_ARG: ${{ steps.defines.outputs.path != '' && format('--defines {0}', steps.defines.outputs.path) || '' }}
        run: |
          mkdir -p ci-output
          # Run ERC+DRC+ODB, skip diff and plots (handled in separate jobs / release)
          nix run "github:solarpi-org/kicad-ci-automation/${{ inputs.kicad-ci-ref }}#kicad-ci" -- \
            --project "${{ inputs.project-path }}" \
            --output  ci-output \
            --prefix  "${{ steps.prefix.outputs.value }}" \
            --skip-diff \
            --skip-plots \
            ${{ env.DEFINES_ARG }} \
            || true   # never hard-fail; we surface violations via comment

      - name: Parse ERC results
        id: erc
        run: |
          COUNT=0
          for REPORT in ci-output/*-erc-report.json; do
            [ -f "$REPORT" ] || continue
            N=$(jq '[.sheets[].violations | length] | add // 0' "$REPORT")
            COUNT=$((COUNT + N))
          done
          echo "violations=$COUNT" >> "$GITHUB_OUTPUT"
          echo "ERC violations: $COUNT"

      - name: Parse DRC results
        id: drc
        run: |
          COUNT=0
          for REPORT in ci-output/*-drc-report.json; do
            [ -f "$REPORT" ] || continue
            N=$(jq '[.violations, .unconnected_items, .schematic_parity] | map(length) | add // 0' "$REPORT")
            COUNT=$((COUNT + N))
          done
          echo "violations=$COUNT" >> "$GITHUB_OUTPUT"
          echo "DRC violations: $COUNT"

      - name: Upload ERC/DRC reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erc-drc-reports
          path: |
            ci-output/*-erc-report.json
            ci-output/*-drc-report.json
            ci-output/*-erc.log
            ci-output/*-drc.log
          retention-days: 30

      - name: Upload ODB++
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: odb-plus-plus
          path: ci-output/*-odb.zip
          retention-days: 90

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const ercCount = parseInt('${{ steps.erc.outputs.violations }}') || 0;
            const drcCount = parseInt('${{ steps.drc.outputs.violations }}') || 0;
            const total    = ercCount + drcCount;

            const icon  = total === 0 ? '✅' : '⚠️';
            const ercIcon = ercCount === 0 ? '✅' : '⚠️';
            const drcIcon = drcCount === 0 ? '✅' : '⚠️';

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `## ${icon} KiCAD CI — ERC & DRC\n\n`;
            body += `| Check | Result |\n|-------|--------|\n`;
            body += `| ${ercIcon} ERC | ${ercCount === 0 ? 'No violations' : \`**${ercCount} violation(s)**\`} |\n`;
            body += `| ${drcIcon} DRC | ${drcCount === 0 ? 'No violations' : \`**${drcCount} violation(s)**\`} |\n`;
            body += `\n`;

            if (total > 0) {
              body += `> **${total} total violation(s)** — review the [ERC/DRC reports](${runUrl}) for details.\n\n`;
            }

            body += `📦 Artifacts: [ERC/DRC reports](${runUrl})\n`;
            body += `\n<sub>KiCAD CI · [kicad-ci-automation](https://github.com/solarpi-org/kicad-ci-automation)</sub>`;

            // Find existing comment to update rather than spam
            const marker = '<!-- kicad-ci-checks -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                issue_number: context.issue.number,
                body:       fullBody,
              });
            }

  # ── Visual Diff (PRs only) ─────────────────────────────────────────────────
  diff:
    name: Visual Diff
    runs-on: ubuntu-latest
    # Only run on PRs and only when enabled
    if: github.event_name == 'pull_request' && inputs.enable-diff
    permissions:
      actions: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Detect defines file
        id: defines
        shell: bash
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -n "${{ inputs.defines-file }}" ] && [ -f "${{ inputs.defines-file }}" ]; then
            echo "path=${{ inputs.defines-file }}" >> "$GITHUB_OUTPUT"
            echo "Found defines file (explicit): ${{ inputs.defines-file }}"
            exit 0
          fi
          for candidate in defines.json defines.yaml defines.yml defines.txt; do
            if [ -f "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              echo "Auto-detected defines file: $candidate"
              exit 0
            fi
          done
          echo "path=" >> "$GITHUB_OUTPUT"
          echo "No defines file found, using built-in placeholders only"

      - name: Get merge base
        id: base
        run: |
          BASE=$(git merge-base HEAD origin/${{ github.base_ref }})
          echo "sha=$BASE" >> "$GITHUB_OUTPUT"
          echo "Merge base: $BASE"

      - name: Build output prefix
        id: prefix
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          PREFIX="pr-${{ github.event.number }}-${SHA}"
          echo "value=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "Output prefix: $PREFIX"

      - name: Run visual diff
        id: diff
        env:
          DEFINES_ARG: ${{ steps.defines.outputs.path != '' && format('--defines {0}', steps.defines.outputs.path) || '' }}
        run: |
          mkdir -p ci-output
          nix run "github:solarpi-org/kicad-ci-automation/${{ inputs.kicad-ci-ref }}#kicad-ci" -- \
            --project  "${{ inputs.project-path }}" \
            --output   ci-output \
            --prefix   "${{ steps.prefix.outputs.value }}" \
            --compare  "${{ steps.base.outputs.sha }}" \
            --skip-erc \
            --skip-drc \
            --skip-odb \
            --skip-plots \
            ${{ env.DEFINES_ARG }} \
            || true

          # Surface whether artifacts were produced
          if compgen -G "ci-output/*-pcb-diff.pdf" > /dev/null; then
            echo "has-pcb-diff=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has-pcb-diff=false" >> "$GITHUB_OUTPUT"
          fi
          if compgen -G "ci-output/*-schematic-diff.pdf" > /dev/null; then
            echo "has-sch-diff=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has-sch-diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: |
            ci-output/*-pcb-diff.pdf
            ci-output/*-schematic-diff.pdf
            ci-output/artifacts-*/triptych-svgs/
          retention-days: 30

      - name: Post diff comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const hasPcbDiff = '${{ steps.diff.outputs.has-pcb-diff }}' === 'true';
            const hasSchDiff = '${{ steps.diff.outputs.has-sch-diff }}' === 'true';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = `## 🔍 KiCAD CI — Visual Diff\n\n`;

            if (!hasPcbDiff && !hasSchDiff) {
              body += `No visual changes detected between this PR and \`${{ github.base_ref }}\`.\n`;
            } else {
              body += `Changes detected vs \`${{ github.base_ref }}\`:\n\n`;
              if (hasPcbDiff) body += `- 📐 **PCB diff** — [pcb-diff.pdf](${runUrl})\n`;
              if (hasSchDiff) body += `- 📋 **Schematic diff** — [schematic-diff.pdf](${runUrl})\n`;
              body += `\n> Triptych: **purple** = removed, **green** = added\n`;
            }

            body += `\n<sub>KiCAD CI · [kicad-ci-automation](https://github.com/solarpi-org/kicad-ci-automation)</sub>`;

            const marker = '<!-- kicad-ci-diff -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                issue_number: context.issue.number,
                body:       fullBody,
              });
            }

  # ── Release: attach ODB++ and visual diff to GitHub Release ─────────────
  release:
    name: Release Artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Detect defines file
        id: defines
        shell: bash
        working-directory: ${{ inputs.project-path }}
        run: |
          if [ -n "${{ inputs.defines-file }}" ] && [ -f "${{ inputs.defines-file }}" ]; then
            echo "path=${{ inputs.defines-file }}" >> "$GITHUB_OUTPUT"
            echo "Found defines file (explicit): ${{ inputs.defines-file }}"
            exit 0
          fi
          for candidate in defines.json defines.yaml defines.yml defines.txt; do
            if [ -f "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              echo "Auto-detected defines file: $candidate"
              exit 0
            fi
          done
          echo "path=" >> "$GITHUB_OUTPUT"
          echo "No defines file found, using built-in placeholders only"

      - name: Find previous release tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name }}"
          echo "Current release: $CURRENT_TAG"

          # List tags sorted by version (most recent first), skip the current one
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            echo "Previous release: $PREV_TAG"
            echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "has-prev=true" >> "$GITHUB_OUTPUT"
          else
            echo "No previous release tag found — skipping diff"
            echo "has-prev=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build output prefix
        id: prefix
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          TAG="${{ github.event.release.tag_name }}"
          PREFIX="${TAG}-${SHA}"
          echo "value=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "Output prefix: $PREFIX"

      - name: Run full CI pipeline
        id: ci
        env:
          DEFINES_ARG: ${{ steps.defines.outputs.path != '' && format('--defines {0}', steps.defines.outputs.path) || '' }}
          COMPARE_ARG: ${{ steps.prev-tag.outputs.has-prev == 'true' && format('--compare {0}', steps.prev-tag.outputs.tag) || '--skip-diff' }}
        run: |
          mkdir -p ci-output
          nix run "github:solarpi-org/kicad-ci-automation/${{ inputs.kicad-ci-ref }}#kicad-ci" -- \
            --project "${{ inputs.project-path }}" \
            --output  ci-output \
            --prefix  "${{ steps.prefix.outputs.value }}" \
            ${{ env.COMPARE_ARG }} \
            ${{ env.DEFINES_ARG }} \
            || true

      - name: Parse ERC/DRC results
        id: results
        run: |
          ERC_COUNT=0
          for REPORT in ci-output/*-erc-report.json; do
            [ -f "$REPORT" ] || continue
            N=$(jq '[.sheets[].violations | length] | add // 0' "$REPORT")
            ERC_COUNT=$((ERC_COUNT + N))
          done

          DRC_COUNT=0
          for REPORT in ci-output/*-drc-report.json; do
            [ -f "$REPORT" ] || continue
            N=$(jq '[.violations, .unconnected_items, .schematic_parity] | map(length) | add // 0' "$REPORT")
            DRC_COUNT=$((DRC_COUNT + N))
          done

          TOTAL=$((ERC_COUNT + DRC_COUNT))
          echo "erc=$ERC_COUNT" >> "$GITHUB_OUTPUT"
          echo "drc=$DRC_COUNT" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL"   >> "$GITHUB_OUTPUT"
          echo "ERC: $ERC_COUNT  DRC: $DRC_COUNT  Total: $TOTAL"

      - name: Generate SBOM
        env:
          FLAKE_REF: "github:solarpi-org/kicad-ci-automation/${{ inputs.kicad-ci-ref }}"
        run: |
          nix run "github:solarpi-org/kicad-ci-automation/${{ inputs.kicad-ci-ref }}#generate-sbom" -- ci-output

      - name: Upload all artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ci-output/*.zip
            ci-output/*-erc-report.json
            ci-output/*-drc-report.json
            ci-output/*-pcb-diff.pdf
            ci-output/*-schematic-diff.pdf
            ci-output/*-schematic.pdf
            ci-output/*-pcb.pdf
            ci-output/sbom.cdx.json
            ci-output/sbom.spdx.json

      - name: Update release body with test status
        uses: actions/github-script@v7
        with:
          script: |
            const ercCount = parseInt('${{ steps.results.outputs.erc }}') || 0;
            const drcCount = parseInt('${{ steps.results.outputs.drc }}') || 0;
            const total    = ercCount + drcCount;

            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: context.payload.release.id,
            });

            const existing = release.data.body || '';
            const marker = '<!-- kicad-ci-status -->';

            let status;
            if (total === 0) {
              status = `${marker}\n\n---\n✅ **ERC/DRC: All checks passed**`;
            } else {
              const icon = '⚠️';
              status  = `${marker}\n\n---\n`;
              status += `${icon} **ERC/DRC: ${total} violation(s)**\n\n`;
              status += `| Check | Violations |\n|-------|------------|\n`;
              status += `| ERC | ${ercCount} |\n`;
              status += `| DRC | ${drcCount} |\n`;
            }

            // Replace existing status block or append
            let body;
            if (existing.includes(marker)) {
              body = existing.replace(/<!-- kicad-ci-status -->[\s\S]*$/, status);
            } else {
              body = existing + '\n' + status;
            }

            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: context.payload.release.id,
              body:       body,
            });
